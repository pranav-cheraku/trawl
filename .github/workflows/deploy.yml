# Deploy: triggers on push to main.
# Frontend deploys via Vercel GitHub integration. Backend Railway deploy is a placeholder pending configuration.

name: Deploy

on:
  push:
    branches:
      - main

jobs:

  # Vercel is connected directly to the repo and auto-deploys on push to main. This job exists only for visibility in the Actions tab.
  frontend:
    name: Frontend → Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Vercel auto-deploy
        run: echo "Frontend deploys automatically via Vercel GitHub integration."

