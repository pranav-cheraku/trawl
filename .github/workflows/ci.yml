# CI: lint and type-check on push to main and on pull requests targeting main.
# No deploy step here. Vercel (frontend) and Railway (backend) deploy via their own
# GitHub integrations on push to main.
# flake8 short-circuits the backend job, so a mypy failure can be hidden if flake8 fails first. Run both locally.

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  frontend:
    name: Frontend (lint + typecheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Type check
        run: cd frontend && npx tsc --noEmit

  backend:
    name: Backend (lint + typecheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: cd backend && pip install -r requirements.txt

      - name: Lint (flake8)
        run: cd backend && flake8 app/

      - name: Type check (mypy)
        run: cd backend && mypy app/
