# asyncio_mode = "auto" means every async def test_* is treated as an asyncio
# test without needing @pytest.mark.asyncio decorators. Do NOT add those
# decorators -- they produce duplicate-coroutine warnings under auto mode.
[tool.pytest.ini_options]
asyncio_mode = "auto"

# ignore_missing_imports is required because most third-party deps lack stubs.
# The sqlalchemy plugin enables typed ORM mapped_column inference.
[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
plugins = ["pydantic.mypy", "sqlalchemy.ext.mypy.plugin"]
exclude = ["alembic/versions/", "venv/"]

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true
warn_untyped_fields = true
