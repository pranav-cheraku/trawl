services:

  # pgvector/pgvector:pg16 ships the extension pre-installed; plain postgres:16 requires manual install.
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: trawl
      POSTGRES_PASSWORD: trawl
      POSTGRES_DB: trawl
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trawl"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads:/tmp/trawl_uploads
    # --reload requires the ./backend volume mount above to detect file changes inside the container.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Same image as api; docker-compose overrides the command so both services share one build.
  worker:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads:/tmp/trawl_uploads
    command: celery -A app.celery_app worker --loglevel=info

volumes:
  pgdata:
  uploads:
